<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox direction</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        #heading{
            text-align:center;
        }
        #container{
            height:150px;
            width:600px;
            padding:10px;
            margin:20px;
            border:3px solid black;
            display:flex;
            flex-direction:row-reverse;
        }
        .box{
            height:100px;
            width:100px;
            margin:5px;
            border:2px solid black;
        }
        #box1{ 
            background-color:aqua;
        }
        #box2{
            background-color:lightcoral;
        }
        #box3{
            background-color:lightgreen
        }
        #box4{
            background-color:lightseagreen;
        }
    </style>
</head>
<body>
    <h1 id="heading">Flexbox container</h1>
    <div id="container">
        <div id="box1" class="box">Flex item 1</div>
        <div id="box2" class="box">Flex item 2</div>
        <div id="box3" class="box">Flex item 3</div>
        <div id="box4" class="box">Flex item 4</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexitem flex-shrink</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        #heading{
            text-align:center;
            margin:2px;
        }
        #container{
            height:300px;
            width:300px;
            border:3px solid;
            background-color: lavender;
            margin:5px;
            display:flex;
        }
        .box{
            height:100px;
            width:100px;
            border:2px solid;
            margin:5px;
            text-align:center;
        }
        #box1{
            background-color:lightgreen;
        }
        #box2{
            background-color:lightskyblue;
            flex-shrink:2;
        }
        #box3{
            background-color:lightpink;
        }
        #box4{
            background-color:lightyellow;
        }
    </style>
</head>
<body>
    <h1 id="heading">Flexbox container</h1>
    <div id="container">
        <div id="box1" class="box">Item 1</div>
        <div id="box2" class="box">Item 2</div>
        <div id="box3" class="box">Item 3</div>
        <div id="box4" class="box">Item 4</div>
</body>
</html>

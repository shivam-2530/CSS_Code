<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display nono</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box{
            height:50px;
            width:50px;
            margin:5px;
            background-color:lightcoral;
            text-align:center;
            border:2px dotted black;
            border-radius:9px;
            display:inline-block;
        }
        #box1{
            visibility:hidden;
            display:none;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">Box1</div>
    <div id="box2" class="box">Box2</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property</title>
    <style>
        .box{
            height:50px;
            width:60px;
            background-color:lightseagreen;
            margin:5px;
            border:2px solid black;
        }
        #box1{
            position:static;
        }
        #box2{
            position:relative;
            left:90px;
            top:10px;
        }
        #box3{
            position:absolute;
            top:200px;
            left:200px;
        }
        #box4{
            position:fixed;
            top:100px;
            left:10px;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">static</div>
    <div id="box2" class="box">realtive</div>
    <div id="box3" class="box">absolute</div>
    <div id="box4" class="box">fixed</div>
</body>
</html>

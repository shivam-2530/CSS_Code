<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative unit em</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        #first{
            height:100px;
            width:200px;
            background-color:bisque;
            font-size:10px;
        }
        #second{
            height:30%;
            width:50%;
            background-color: blueviolet;
            font-size:2em;
        }
    </style>
</head>
<body>
    <div id="first">
        first
        <div id="second">
            second
        </div>
    </div>
</body>
</html>

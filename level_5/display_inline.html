<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display inline</title>
    <style>
        *{
            margin:0;
            padding: 0;
        }
        .box{
            height: 50px;
            width:50px;
            margin:10px;
            background-color:aquamarine;
            text-align:center;
            border:2px dashed black;
            border-radius:8px;
            display:inline;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">Box1</div>
    <div id="box2" class="box">Box2</div>
</body>
</html>

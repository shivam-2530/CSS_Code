<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>
    <style>
        #button{
            margin: 5px;
            padding:2px;
            height: 50px;
            width: 50px;
            border:2px dashed black;
            border-radius:8px;
            box-sizing: content-box;
            background-color:cadetblue
        }
    </style>
</head>
<body>
    <button id="button">click me</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin</title>
    <style>
        *{
            margin:0;
            padding: 0;
        }
        .code{
            padding: 5px;
            height:50px;
            width:50px;
        }
        #first{
            margin: 5px 5px 10px 5px;
            background-color: bisque;
        }
        #second{
            margin:30px 5px 5px 5px;
            background-color:cyan
        }
    </style>
</head>
<body>
    <div id="first" class="code">first</div>
    <div id="second" class="code">second</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice set 7</title>
    <style>
        .progress_container{
            margin:10px;
            height: 25px;
            width:90%;
            border:2px solid black;
            background-color:antiquewhite;
            border-radius:20px;
        }
        #progress_bar{
            height:100%;
            background-color:green;
            border-radius:20px;
            animation: progress 8s 5 ;
        }
        @keyframes progress {
            0%{width:0%}
            50%{width:50%}
            70%{width:70%}
            90%{width:90%}
            95%{width:70%}
            100%{width:100%}
        }
    </style>
</head>
<body>
    <div class="progress_container">
        <div id="progress_bar"></div>
    </div>
</body>
</html>

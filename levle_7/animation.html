<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        .animate{
            margin:10px;
            padding:5px;
            height:70px;
            width: 70px;
            background-color:hotpink;
            border:2px solid black;
            position:absolute;

            animation-name:moving;
            animation-duration: 2s;
            animation-timing-function:ease-in-out;
            animation-delay:1s;
            animation-iteration-count:infinite;
            animation-direction: alternate;
        }
        @keyframes moving{
            from{left:10px}
            to{left:200px}
        }

        #animate1{
            margin:100px;
            padding:5px;
            height: 70px;
            width: 70px;
            background-color:hotpink;
            border:2px solid black;
            position:absolute;

            animation-name:zig;
            animation-duration: 2s;
            animation-timing-function:ease-in-out;
            animation-delay:1s;
            animation-iteration-count:infinite;
            animation-direction: none;
        }
        @keyframes zig {
            0%{left:10px; top:0px}
            50%{left:150px; top:100px}
            75%{left:300px; top:0px}
            100%{left:10px;}
        }
    </style>
</head>
<body>
    <div class="animate">Animation</div>
    <div id="animate1">Animation</div>
</body>
</html>
